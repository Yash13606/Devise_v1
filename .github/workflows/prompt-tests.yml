name: Prompt Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  prompt-tests:
    name: Promptfoo Prompt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies (root)
        run: pip install -r requirements.txt

      - name: Install Python dependencies (agent)
        run: pip install -r devise-agent/devise-eye/requirements.txt

      - name: Install npm dependencies (root)
        run: npm install

      - name: Run Promptfoo prompt tests
        env:
          SUPERAGENT_API_KEY: ${{ secrets.SUPERAGENT_API_KEY }}
        run: npm run test:prompts

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (agent)
        run: pip install -r devise-agent/devise-eye/requirements.txt

      - name: Run pytest
        working-directory: devise-agent/devise-eye
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short || true
