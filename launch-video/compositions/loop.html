<template id="loop-template">
  <div
    data-composition-id="loop"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="6"
  >
    <div class="lp-bg"></div>
    <div class="lp-grain"></div>

    <!-- Title -->
    <div class="lp-title">
      <span class="lp-w lp-w1">Every</span>
      <span class="lp-w lp-w2">cycle</span>
      <span class="lp-w lp-w3 lp-emph">compounds.</span>
    </div>

    <!-- Three orbiting nodes in a triangle -->
    <div class="lp-stage">
      <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" class="lp-svg">
        <defs>
          <linearGradient id="lp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF9966"/>
            <stop offset="50%" stop-color="#FF6600"/>
            <stop offset="100%" stop-color="#FF0000"/>
          </linearGradient>
          <filter id="lp-glow">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Loop path -->
        <path id="lp-circle" d="M 400 120 A 280 280 0 1 1 399.99 120"
              fill="none" stroke="url(#lp-grad)" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="1800" stroke-dashoffset="1800"
              class="lp-ring"/>

        <!-- Travelling pip -->
        <circle class="lp-pip" cx="400" cy="120" r="14" fill="url(#lp-grad)" filter="url(#lp-glow)"/>

        <!-- Three node circles at 12, 4, 8 o'clock -->
        <g class="lp-nodes">
          <circle class="lp-node n-1" cx="400" cy="120" r="56" fill="#FFFFFF" stroke="#FF6600" stroke-width="3"/>
          <circle class="lp-node n-2" cx="643" cy="540" r="56" fill="#FFFFFF" stroke="#FF6600" stroke-width="3"/>
          <circle class="lp-node n-3" cx="157" cy="540" r="56" fill="#FFFFFF" stroke="#FF6600" stroke-width="3"/>
        </g>
      </svg>

      <!-- Node labels (HTML overlays for crisper type) -->
      <div class="lp-label lp-label-1">
        <div class="lp-label-title">Understand</div>
      </div>
      <div class="lp-label lp-label-2">
        <div class="lp-label-title">Act</div>
      </div>
      <div class="lp-label lp-label-3">
        <div class="lp-label-title">Quantify</div>
      </div>
    </div>

    <!-- Compound multipliers -->
    <div class="lp-mult">
      <div class="mlt mlt-1">1×</div>
      <div class="mlt mlt-2">2×</div>
      <div class="mlt mlt-3">4×</div>
      <div class="mlt mlt-4">∞</div>
    </div>

    <!-- Bottom strap -->
    <div class="lp-strap">A flywheel, not a push.</div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap");

      [data-composition-id="loop"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F5EDE0; color: #14110A;
      }
      [data-composition-id="loop"] .lp-bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 50%, #FCF6E7 0%, #F5EDE0 60%, #EBDFC9 100%);
      }
      [data-composition-id="loop"] .lp-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }

      [data-composition-id="loop"] .lp-title {
        position: absolute;
        top: 90px; left: 50%;
        transform: translateX(-50%);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 800;
        font-size: 92px;
        letter-spacing: -0.04em;
        line-height: 1;
        color: #14110A;
        white-space: nowrap;
      }
      [data-composition-id="loop"] .lp-w {
        display: inline-block;
        opacity: 0;
        transform: translateY(20px);
        margin: 0 6px;
      }
      [data-composition-id="loop"] .lp-emph {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-weight: 400;
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 50%, #FF0000 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }

      [data-composition-id="loop"] .lp-stage {
        position: absolute;
        left: 50%; top: 50%;
        margin: -310px 0 0 -400px;
        width: 800px; height: 800px;
      }
      [data-composition-id="loop"] .lp-svg {
        width: 100%; height: 100%;
        overflow: visible;
      }
      [data-composition-id="loop"] .lp-ring { opacity: 0; }
      [data-composition-id="loop"] .lp-pip { opacity: 0; }
      [data-composition-id="loop"] .lp-node {
        opacity: 0;
        transform-origin: center;
        transform-box: fill-box;
      }

      [data-composition-id="loop"] .lp-label {
        position: absolute;
        font-family: "Plus Jakarta Sans", sans-serif;
        text-align: center;
        opacity: 0;
      }
      [data-composition-id="loop"] .lp-label-title {
        font-weight: 700;
        font-size: 34px;
        color: #14110A;
        letter-spacing: -0.02em;
      }
      [data-composition-id="loop"] .lp-label-1 { left: 50%; top: 20px; transform: translateX(-50%); }
      [data-composition-id="loop"] .lp-label-2 { left: 80%; top: 60%; }
      [data-composition-id="loop"] .lp-label-3 { left: 4%; top: 60%; }

      [data-composition-id="loop"] .lp-mult {
        position: absolute;
        right: 80px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column;
        gap: 24px;
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      [data-composition-id="loop"] .mlt {
        font-weight: 800;
        font-size: 110px;
        line-height: 0.95;
        letter-spacing: -0.05em;
        color: #14110A;
        opacity: 0;
      }
      [data-composition-id="loop"] .mlt-4 {
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 50%, #FF0000 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        font-size: 140px;
      }

      [data-composition-id="loop"] .lp-strap {
        position: absolute;
        left: 50%;
        bottom: 210px;
        transform: translateX(-50%);
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 52px;
        color: #2A1F0A;
        opacity: 0;
        letter-spacing: -0.005em;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MotionPathPlugin.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        if (window.gsap && window.MotionPathPlugin) gsap.registerPlugin(MotionPathPlugin);
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="loop"]');

        const words = root.querySelectorAll(".lp-w");
        const ring = root.querySelector(".lp-ring");
        const pip = root.querySelector(".lp-pip");
        const nodes = root.querySelectorAll(".lp-node");
        const labels = root.querySelectorAll(".lp-label");
        const mlts = root.querySelectorAll(".mlt");
        const strap = root.querySelector(".lp-strap");

        // Title words stagger in
        words.forEach((w, i) => {
          tl.to(w, {
            opacity: 1, y: 0,
            duration: 0.4, ease: "expo.out"
          }, 0.05 + i * 0.18);
        });

        // 0.5 : Ring strokes in
        tl.to(ring, { opacity: 1, duration: 0.3, ease: "power2.out" }, 0.5);
        tl.to(ring, {
          strokeDashoffset: 0,
          duration: 1.6,
          ease: "power2.inOut"
        }, 0.55);

        // 1.0 : Nodes pop one at a time
        nodes.forEach((n, i) => {
          gsap.set(n, { scale: 0.4, transformOrigin: "center" });
          tl.to(n, {
            opacity: 1, scale: 1,
            duration: 0.4, ease: "back.out(2)"
          }, 0.8 + i * 0.25);
          tl.to(labels[i], {
            opacity: 1,
            duration: 0.35, ease: "power2.out"
          }, 0.95 + i * 0.25);
        });

        // 1.8 : Pip starts traveling along ring (3 laps for compound feel)
        tl.to(pip, { opacity: 1, duration: 0.2, ease: "power2.out" }, 1.8);

        try {
          if (window.MotionPathPlugin) {
            tl.to(pip, {
              motionPath: {
                path: "#lp-circle",
                autoRotate: false,
                start: 0,
                end: 3 // 3 full laps
              },
              duration: 3.6,
              ease: "power1.in"
            }, 1.9);
          }
        } catch (e) {}

        // Multipliers appear in sync with laps
        const multTimes = [2.0, 2.9, 3.8, 4.7];
        mlts.forEach((m, i) => {
          gsap.set(m, { scale: 0.6, x: 30 });
          tl.to(m, {
            opacity: 1, scale: 1, x: 0,
            duration: 0.45, ease: "expo.out"
          }, multTimes[i]);
          // earlier multipliers slightly fade as new ones come
          if (i < mlts.length - 1) {
            tl.to(m, { opacity: 0.35, duration: 0.4, ease: "power2.in" }, multTimes[i+1]);
          }
        });

        // Strap line lands at the end with a pop
        tl.to(strap, {
          opacity: 1, y: -10, duration: 0.5, ease: "expo.out"
        }, 4.5);

        // Fade exit
        tl.to([...words, ring, pip, ...nodes, ...labels, ...mlts, strap], {
          opacity: 0, duration: 0.5, ease: "power2.in"
        }, 5.5);

        window.__timelines["loop"] = tl;
      })();
    </script>
  </div>
</template>
