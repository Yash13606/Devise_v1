<template id="orbit-template">
  <div
    data-composition-id="orbit"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="6"
  >
    <div class="orb-bg"></div>
    <div class="orb-grain"></div>

    <!-- Central org silhouette -->
    <div class="orb-center">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Org chart silhouette: one boss, three reports, each with 2 reports -->
        <g class="org-svg" fill="none" stroke="#1A1A1A" stroke-width="2.5" opacity="0.75">
          <circle cx="100" cy="40" r="14"/>
          <circle cx="40" cy="100" r="11"/>
          <circle cx="100" cy="100" r="11"/>
          <circle cx="160" cy="100" r="11"/>
          <circle cx="25" cy="160" r="8"/>
          <circle cx="55" cy="160" r="8"/>
          <circle cx="85" cy="160" r="8"/>
          <circle cx="115" cy="160" r="8"/>
          <circle cx="145" cy="160" r="8"/>
          <circle cx="175" cy="160" r="8"/>
          <line x1="100" y1="54" x2="40" y2="89"/>
          <line x1="100" y1="54" x2="100" y2="89"/>
          <line x1="100" y1="54" x2="160" y2="89"/>
          <line x1="40" y1="111" x2="25" y2="152"/>
          <line x1="40" y1="111" x2="55" y2="152"/>
          <line x1="100" y1="111" x2="85" y2="152"/>
          <line x1="100" y1="111" x2="115" y2="152"/>
          <line x1="160" y1="111" x2="145" y2="152"/>
          <line x1="160" y1="111" x2="175" y2="152"/>
        </g>
      </svg>
    </div>

    <!-- Orbiting tool chips: positioned along an ellipse -->
    <div class="tools">
      <div class="tool t-1"><span>ChatGPT</span></div>
      <div class="tool t-2"><span>Claude</span></div>
      <div class="tool t-3"><span>Gemini</span></div>
      <div class="tool t-4"><span>Copilot</span></div>
      <div class="tool t-5"><span>Cursor</span></div>
      <div class="tool t-6"><span>Midjourney</span></div>
      <div class="tool t-7"><span>Notion AI</span></div>
      <div class="tool t-8"><span>Perplexity</span></div>
      <div class="tool t-9"><span>Grammarly</span></div>
      <div class="tool t-10"><span>Replit</span></div>
      <div class="tool t-11"><span>v0</span></div>
      <div class="tool t-12"><span>Bolt</span></div>
      <div class="tool t-13"><span>Lovable</span></div>
      <div class="tool t-14"><span>Windsurf</span></div>
      <div class="tool t-15"><span>Suno</span></div>
      <div class="tool t-16"><span>Eleven Labs</span></div>
      <div class="tool t-17"><span>Runway</span></div>
      <div class="tool t-18"><span>+ 6,500 more</span></div>
    </div>

    <!-- Headline + sub -->
    <div class="orb-headline">
      <div class="orb-num"><span class="n1">200</span><span class="plus">+</span></div>
      <div class="orb-label">AI tools per enterprise</div>
    </div>
    <div class="orb-sub">
      <span class="w w1">Zero</span> <span class="w w2">adoption.</span>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap");

      [data-composition-id="orbit"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        overflow: hidden;
        background: #F5EDE0;
        color: #14110A;
      }
      [data-composition-id="orbit"] .orb-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 50%, #FCF6E7 0%, #F5EDE0 60%, #EFE3CC 100%),
          radial-gradient(ellipse at 50% 50%, rgba(240,78,35,0.08) 0%, transparent 60%);
      }
      [data-composition-id="orbit"] .orb-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.05 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }

      [data-composition-id="orbit"] .orb-center {
        position: absolute;
        left: 50%; top: 50%;
        width: 280px; height: 280px;
        margin: -140px 0 0 -140px;
        opacity: 0;
      }
      [data-composition-id="orbit"] .org-svg {
        will-change: transform;
      }

      [data-composition-id="orbit"] .tools {
        position: absolute; inset: 0;
      }
      [data-composition-id="orbit"] .tool {
        position: absolute;
        left: 50%; top: 50%;
        padding: 14px 26px;
        border-radius: 999px;
        background: rgba(255,255,255,0.85);
        border: 1px solid rgba(20,17,10,0.10);
        box-shadow: 0 4px 16px rgba(20,17,10,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(6px);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 600;
        font-size: 22px;
        color: #14110A;
        white-space: nowrap;
        opacity: 0;
        will-change: transform, opacity;
        transform-origin: center;
      }
      [data-composition-id="orbit"] .tool.hot {
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 100%);
        color: #FFF;
        border-color: rgba(255,255,255,0.4);
        box-shadow: 0 6px 20px rgba(255,102,0,0.35);
      }
      [data-composition-id="orbit"] .tool.big {
        font-size: 28px;
        padding: 18px 34px;
        background: #14110A;
        color: #F5EDE0;
        border: none;
      }

      [data-composition-id="orbit"] .orb-headline {
        position: absolute;
        left: 50%;
        top: 56%;
        transform: translate(-50%, 0);
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: "Plus Jakarta Sans", sans-serif;
        opacity: 0;
      }
      [data-composition-id="orbit"] .orb-num {
        display: flex; align-items: baseline;
        font-weight: 800;
        font-size: 220px;
        line-height: 0.95;
        letter-spacing: -0.04em;
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 60%, #FF0000 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        font-feature-settings: "tnum";
      }
      [data-composition-id="orbit"] .orb-num .plus { font-size: 140px; }
      [data-composition-id="orbit"] .orb-label {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 44px;
        color: #2A1F0A;
        margin-top: 12px;
        letter-spacing: -0.01em;
      }

      [data-composition-id="orbit"] .orb-sub {
        position: absolute;
        left: 50%;
        bottom: 120px;
        transform: translateX(-50%);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 700;
        font-size: 88px;
        letter-spacing: -0.03em;
        color: #14110A;
        opacity: 0;
      }
      [data-composition-id="orbit"] .orb-sub .w1 { color: #FF6600; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="orbit"]');

        const center = root.querySelector(".orb-center");
        const tools = root.querySelectorAll(".tool");
        const headline = root.querySelector(".orb-headline");
        const sub = root.querySelector(".orb-sub");

        // Position tools in two orbital rings
        const W = 1920, H = 1080, cx = W/2, cy = H/2;
        const ring1 = { rx: 480, ry: 260 };
        const ring2 = { rx: 760, ry: 420 };
        const ringMap = [ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring2, ring1, ring1];
        // Deterministic seeded PRNG (mulberry32)
        function seeded(seed) { return function() { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let t = Math.imul(seed ^ seed >>> 15, 1 | seed); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
        const rnd = seeded(42);
        tools.forEach((t, i) => {
          const ring = ringMap[i] || ring1;
          const angle = (i / tools.length) * Math.PI * 2 + Math.PI/8;
          const x = Math.cos(angle) * ring.rx;
          const y = Math.sin(angle) * ring.ry;
          t.dataset.x = x; t.dataset.y = y;
          gsap.set(t, { x: x + (rnd()*40-20), y: y + (rnd()*40-20), scale: 0.6, opacity: 0 });
        });
        // Mark last few as hot/big
        tools[tools.length-1].classList.add("big");

        // Center pops in first
        gsap.set(center, { scale: 0.7 });
        tl.to(center, { opacity: 1, scale: 1, duration: 0.6, ease: "expo.out" }, 0);

        // Tools cascade in
        tools.forEach((t, i) => {
          tl.to(t, {
            opacity: 1, scale: 1,
            x: parseFloat(t.dataset.x), y: parseFloat(t.dataset.y),
            duration: 0.45,
            ease: "expo.out"
          }, 0.1 + i * 0.08);
        });

        // Slow continuous orbit — rotate the entire group subtly
        tools.forEach((t, i) => {
          tl.to(t, {
            x: `+=${Math.cos(i+2)*10}`,
            y: `+=${Math.sin(i+2)*10}`,
            duration: 3,
            ease: "sine.inOut",
            yoyo: true,
            repeat: 1
          }, 1.5);
        });

        // 2.0 : Headline appears
        gsap.set(headline, { y: 30 });
        tl.to(headline, { opacity: 1, y: 0, duration: 0.7, ease: "expo.out" }, 1.8);

        // Number counts up 0 → 200
        const numEl = root.querySelector(".n1");
        const counter = { v: 0 };
        tl.to(counter, {
          v: 200,
          duration: 1.2,
          ease: "power2.out",
          onUpdate: () => { numEl.textContent = Math.round(counter.v); }
        }, 1.8);

        // Push pulse on the center silhouette to feel "loaded"
        tl.to(center, { scale: 1.05, duration: 0.3, ease: "power2.out" }, 3.0);
        tl.to(center, { scale: 1, duration: 0.5, ease: "power2.inOut" }, 3.3);

        // 4.0 : Sub-headline punch — "Zero. adoption."
        gsap.set(sub, { y: 30 });
        tl.to(sub, { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 3.95);

        // Shake the tools subtly when "Zero adoption" lands
        tl.to(tools, {
          opacity: 0.45,
          duration: 0.5,
          ease: "power2.inOut"
        }, 4.2);

        // 5.5 : Everything fades for transition
        tl.to([center, headline, sub, ...tools], {
          opacity: 0,
          duration: 0.5,
          ease: "power2.in"
        }, 5.5);

        window.__timelines["orbit"] = tl;
      })();
    </script>
  </div>
</template>
