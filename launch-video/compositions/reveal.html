<template id="reveal-template">
  <div
    data-composition-id="reveal"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="5"
  >
    <div class="rv-bg"></div>
    <div class="rv-grain"></div>

    <!-- Particle field that converges to logo -->
    <div class="rv-particles">
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
      <span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span><span class="p"></span>
    </div>

    <!-- Devise Logo (recreated as inline SVG for animation control) -->
    <div class="rv-logo-wrap">
      <svg class="rv-logo" viewBox="0 0 2194 2022" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient cx="3039687" cy="2801389" r="4133700" fx="0" fy="5602778"
            gradientUnits="userSpaceOnUse" spreadMethod="pad" id="rv-fill"
            gradientTransform="matrix(0.000360892 0 0 0.000360892 -1798 -103)">
            <stop offset="0" stop-color="#FF0000"/>
            <stop offset="0.5" stop-color="#FF6600"/>
            <stop offset="1" stop-color="#FF9966"/>
          </radialGradient>
        </defs>
        <g transform="translate(-1798 -103)">
          <path d="M2918.94 580.472 2918.94 1060.93 2322.68 1060.93 2322.68 1613.74 2918.94 1613.74 3050.83 1613.74 3425.86 1613.74 3425.86 580.472ZM2889.21 103 3992 103 3992 1083.06 3992 1083.06 3992 1135.11 3463.35 1656.68 3463.34 1656.68 3463.34 2125 2319.01 2125C2031.27 2125 1798 1891.75 1798 1604.02L1798 1083.06C1798 795.331 2031.27 562.079 2319.01 562.079L2889.21 562.079Z"
            fill="url(#rv-fill)" fill-rule="evenodd"/>
        </g>
      </svg>
    </div>

    <!-- Wordmark typed -->
    <div class="rv-wordmark">
      <span class="ltr">D</span><span class="ltr">e</span><span class="ltr">v</span><span class="ltr">i</span><span class="ltr">s</span><span class="ltr">e</span>
    </div>

    <!-- Tagline -->
    <div class="rv-tag">
      <span class="t-w">Understand.</span>
      <span class="t-w">Act.</span>
      <span class="t-w">Quantify.</span>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Instrument+Serif:ital@0;1&display=swap");

      [data-composition-id="reveal"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F5EDE0; color: #14110A;
      }
      [data-composition-id="reveal"] .rv-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 50%, #FCF6E7 0%, #F5EDE0 60%, #EFE3CC 100%);
      }
      [data-composition-id="reveal"] .rv-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }

      [data-composition-id="reveal"] .rv-particles {
        position: absolute; inset: 0;
      }
      [data-composition-id="reveal"] .p {
        position: absolute;
        left: 50%; top: 50%;
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #FF6600;
        opacity: 0;
        box-shadow: 0 0 12px rgba(255,102,0,0.6);
      }

      [data-composition-id="reveal"] .rv-logo-wrap {
        position: absolute;
        left: 50%; top: 30%;
        transform: translate(-50%, -50%);
        width: 300px; height: 272px;
        opacity: 0;
      }
      [data-composition-id="reveal"] .rv-logo {
        width: 100%; height: 100%;
      }

      [data-composition-id="reveal"] .rv-wordmark {
        position: absolute;
        left: 50%; top: 58%;
        transform: translate(-50%, -50%);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 800;
        font-size: 160px;
        letter-spacing: -0.05em;
        color: #14110A;
        display: flex;
      }
      [data-composition-id="reveal"] .ltr {
        display: inline-block;
        opacity: 0;
        transform: translateY(20px);
      }
      [data-composition-id="reveal"] .rv-tag {
        position: absolute;
        left: 50%;
        bottom: 180px;
        transform: translateX(-50%);
        display: flex;
        gap: 36px;
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 48px;
        color: #2A1F0A;
        opacity: 0;
        letter-spacing: -0.01em;
      }
      [data-composition-id="reveal"] .t-w { opacity: 0; }
      [data-composition-id="reveal"] .t-w:nth-child(2) { color: #FF6600; font-weight: 500; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="reveal"]');

        const particles = root.querySelectorAll(".p");
        const logoWrap = root.querySelector(".rv-logo-wrap");
        const letters = root.querySelectorAll(".ltr");
        const tagWrap = root.querySelector(".rv-tag");
        const tagWords = root.querySelectorAll(".t-w");

        // Deterministic seeded PRNG
        function seeded(seed) { return function() { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let t = Math.imul(seed ^ seed >>> 15, 1 | seed); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
        const rnd = seeded(7);
        // Particles start scattered from outside, converge to logo center
        particles.forEach((p, i) => {
          const angle = (i / particles.length) * Math.PI * 2;
          const radius = 600 + rnd() * 400;
          const startX = Math.cos(angle) * radius;
          const startY = Math.sin(angle) * radius;
          gsap.set(p, { x: startX, y: startY, opacity: 0 });
        });

        // 0–1.2 : Particles light up
        tl.to(particles, {
          opacity: 0.9,
          duration: 0.4,
          stagger: 0.01,
          ease: "power2.out"
        }, 0);

        // 0.4–1.5 : Particles converge to center
        tl.to(particles, {
          x: 0, y: 0,
          scale: 0.4,
          duration: 1.0,
          stagger: 0.012,
          ease: "expo.in"
        }, 0.4);

        // 1.5 : Flash + logo materializes
        tl.set(particles, { opacity: 0 }, 1.5);
        gsap.set(logoWrap, { scale: 0.4 });
        tl.to(logoWrap, {
          opacity: 1, scale: 1,
          duration: 0.7,
          ease: "expo.out"
        }, 1.5);

        // 2.2 : Tiny logo bounce (settle)
        tl.to(logoWrap, {
          scale: 1.04,
          duration: 0.18,
          ease: "power2.out"
        }, 2.25);
        tl.to(logoWrap, {
          scale: 1,
          duration: 0.35,
          ease: "elastic.out(1, 0.5)"
        }, 2.43);

        // 2.5 : Wordmark types in letter by letter
        letters.forEach((l, i) => {
          tl.to(l, {
            opacity: 1, y: 0,
            duration: 0.18,
            ease: "power2.out"
          }, 2.45 + i * 0.07);
        });

        // 3.4 : Tagline reveals word by word
        tl.to(tagWrap, { opacity: 1, duration: 0.3, ease: "power2.out" }, 3.4);
        tagWords.forEach((w, i) => {
          gsap.set(w, { y: 16 });
          tl.to(w, {
            opacity: 1, y: 0,
            duration: 0.35,
            ease: "expo.out"
          }, 3.4 + i * 0.22);
        });

        window.__timelines["reveal"] = tl;
      })();
    </script>
  </div>
</template>
