<template id="phases-template">
  <div
    data-composition-id="phases"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="7"
  >
    <div class="ph-bg"></div>
    <div class="ph-grain"></div>

    <!-- Three phase columns -->
    <div class="ph-grid">
      <!-- Phase 1: Understand -->
      <div class="ph-col ph-1">
        <div class="ph-glow"></div>
        <div class="ph-num">01</div>
        <div class="ph-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="40" r="30" fill="none" stroke="#FF6600" stroke-width="2.5"/>
            <circle cx="40" cy="40" r="18" fill="none" stroke="#FF6600" stroke-width="2" opacity="0.55"/>
            <circle cx="40" cy="40" r="6" fill="#FF6600"/>
            <path d="M40 10 L40 5 M40 70 L40 75 M10 40 L5 40 M70 40 L75 40" stroke="#FF6600" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="ph-title">Understand</div>
        <div class="ph-sub">Detect every AI tool</div>
        <div class="ph-fact">6,500+ tools<br/>via network signals</div>
      </div>

      <!-- Phase 2: Act -->
      <div class="ph-col ph-2">
        <div class="ph-glow"></div>
        <div class="ph-num">02</div>
        <div class="ph-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 8 L50 32 L72 32 L54 48 L62 72 L40 58 L18 72 L26 48 L8 32 L30 32 Z" fill="none" stroke="#FF6600" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="40" cy="40" r="5" fill="#FF6600"/>
          </svg>
        </div>
        <div class="ph-title">Act</div>
        <div class="ph-sub">Intervene in real time</div>
        <div class="ph-fact">Steer · Discover<br/>Coach · Unblock</div>
      </div>

      <!-- Phase 3: Quantify -->
      <div class="ph-col ph-3">
        <div class="ph-glow"></div>
        <div class="ph-num">03</div>
        <div class="ph-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="50" width="14" height="20" rx="2" fill="#FF6600"/>
            <rect x="28" y="36" width="14" height="34" rx="2" fill="#FF6600" opacity="0.7"/>
            <rect x="46" y="22" width="14" height="48" rx="2" fill="#FF6600"/>
            <rect x="64" y="10" width="6" height="60" rx="2" fill="#FF6600" opacity="0.85"/>
          </svg>
        </div>
        <div class="ph-title">Quantify</div>
        <div class="ph-sub">Prove ROI in dollars</div>
        <div class="ph-fact">$0 → <span class="ph-money">$340K</span><br/>in 60 days</div>
      </div>
    </div>

    <!-- Title bar at top -->
    <div class="ph-overline">The Devise Engine</div>

    <!-- Bottom connector -->
    <div class="ph-loop">
      <svg viewBox="0 0 1400 120" xmlns="http://www.w3.org/2000/svg">
        <path id="loop-path" d="M 200 60 Q 700 -10 1200 60" fill="none" stroke="#FF6600" stroke-width="2.5" stroke-dasharray="6 6"/>
        <circle class="loop-pip" r="6" fill="#FF6600"/>
      </svg>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap");

      [data-composition-id="phases"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F5EDE0; color: #14110A;
      }
      [data-composition-id="phases"] .ph-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 30%, #FCF6E7 0%, #F5EDE0 65%, #EBDFC9 100%);
      }
      [data-composition-id="phases"] .ph-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }

      [data-composition-id="phases"] .ph-overline {
        position: absolute;
        top: 80px; left: 50%;
        transform: translateX(-50%);
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 56px;
        color: #2A1F0A;
        letter-spacing: -0.01em;
        opacity: 0;
      }

      [data-composition-id="phases"] .ph-grid {
        position: absolute;
        inset: 200px 100px 200px 100px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 48px;
      }
      [data-composition-id="phases"] .ph-col {
        position: relative;
        background: rgba(255,255,255,0.78);
        border: 1px solid rgba(20,17,10,0.08);
        border-radius: 32px;
        padding: 56px 48px;
        box-shadow: 0 16px 48px rgba(20,17,10,0.07), inset 0 1px 0 rgba(255,255,255,0.9);
        backdrop-filter: blur(8px);
        opacity: 0;
        will-change: transform, opacity;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        overflow: hidden;
      }
      [data-composition-id="phases"] .ph-glow {
        position: absolute;
        right: -100px; top: -100px;
        width: 320px; height: 320px;
        background: radial-gradient(circle, rgba(255,102,0,0.18) 0%, transparent 70%);
        filter: blur(12px);
        opacity: 0;
        pointer-events: none;
      }
      [data-composition-id="phases"] .ph-num {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 26px;
        color: #FF6600;
        letter-spacing: 0.04em;
        margin-bottom: 28px;
      }
      [data-composition-id="phases"] .ph-icon {
        width: 100px; height: 100px;
        margin-bottom: 36px;
        opacity: 0;
      }
      [data-composition-id="phases"] .ph-title {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 800;
        font-size: 78px;
        line-height: 1;
        letter-spacing: -0.04em;
        color: #14110A;
        margin-bottom: 16px;
      }
      [data-composition-id="phases"] .ph-sub {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 32px;
        color: #4A3820;
        margin-bottom: 36px;
      }
      [data-composition-id="phases"] .ph-fact {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 500;
        font-size: 28px;
        line-height: 1.4;
        color: #14110A;
        padding-top: 28px;
        border-top: 1px solid rgba(20,17,10,0.12);
        width: 100%;
      }
      [data-composition-id="phases"] .ph-money {
        font-weight: 800;
        font-size: 38px;
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }

      [data-composition-id="phases"] .ph-loop {
        position: absolute;
        left: 50%;
        bottom: 100px;
        transform: translateX(-50%);
        width: 1400px;
        height: 120px;
        opacity: 0;
      }
      [data-composition-id="phases"] .ph-loop svg {
        width: 100%; height: 100%;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MotionPathPlugin.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        if (window.gsap && window.MotionPathPlugin) gsap.registerPlugin(MotionPathPlugin);
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="phases"]');

        const overline = root.querySelector(".ph-overline");
        const cols = root.querySelectorAll(".ph-col");
        const icons = root.querySelectorAll(".ph-icon");
        const glows = root.querySelectorAll(".ph-glow");
        const loop = root.querySelector(".ph-loop");
        const loopPip = root.querySelector(".loop-pip");

        // Initial offsets
        cols.forEach((c, i) => gsap.set(c, { y: 80 }));
        gsap.set(overline, { y: -20 });

        // 0–0.5: Overline appears
        tl.to(overline, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0.1);

        // Phase columns cascade in with a beat
        cols.forEach((c, i) => {
          tl.to(c, {
            opacity: 1, y: 0,
            duration: 0.55, ease: "expo.out"
          }, 0.5 + i * 0.45);
          tl.to(icons[i], {
            opacity: 1,
            duration: 0.4, ease: "power2.out"
          }, 0.65 + i * 0.45);
          tl.to(glows[i], {
            opacity: 1,
            duration: 0.6, ease: "power2.out"
          }, 0.7 + i * 0.45);
        });

        // 3.5 : Bottom loop reveals
        tl.to(loop, { opacity: 1, duration: 0.4, ease: "power2.out" }, 3.2);

        // Pip travels along the path
        try {
          if (window.MotionPathPlugin && loopPip) {
            tl.to(loopPip, {
              motionPath: { path: "#loop-path", autoRotate: false },
              duration: 2.5,
              ease: "power1.inOut"
            }, 3.5);
          }
        } catch (e) {}

        // 5.5 : "Money" pulse on Quantify card
        const money = root.querySelector(".ph-money");
        tl.to(money, {
          scale: 1.1, duration: 0.3, ease: "power2.out"
        }, 5.5);
        tl.to(money, {
          scale: 1, duration: 0.5, ease: "elastic.out(1, 0.4)"
        }, 5.8);

        // 6.5 : All fade out (transition)
        tl.to([overline, ...cols, loop], {
          opacity: 0,
          duration: 0.5, ease: "power2.in"
        }, 6.5);

        window.__timelines["phases"] = tl;
      })();
    </script>
  </div>
</template>
