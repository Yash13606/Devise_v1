<template id="interventions-template">
  <div
    data-composition-id="interventions"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="15"
  >
    <div class="iv-bg"></div>
    <div class="iv-grain"></div>

    <!-- Network background lines -->
    <svg class="iv-net" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="iv-line" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#FF6600" stop-opacity="0"/>
          <stop offset="50%" stop-color="#FF6600" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <g stroke="url(#iv-line)" stroke-width="1.2" fill="none">
        <line x1="0" y1="200" x2="1920" y2="200" opacity="0.45"/>
        <line x1="0" y1="880" x2="1920" y2="880" opacity="0.45"/>
      </g>
    </svg>

    <!-- HEADER: status (left) + total (right) -->
    <div class="iv-status">
      <div class="iv-pulse"></div>
      <span class="iv-live-text">LIVE — Devise Engine</span>
      <span class="iv-time" id="iv-time">10:14:02 EDT</span>
    </div>

    <div class="iv-total">
      <div class="iv-total-label">Saved so far</div>
      <div class="iv-total-val"><span class="dollar">$</span><span id="total-counter">0</span></div>
    </div>

    <!-- ═══════════ CARD 1 · TOOL STEERING ═══════════ -->
    <div class="iv-card iv-card-1">
      <div class="iv-card-head">
        <div class="iv-tag tag-steering">
          <span class="iv-dot"></span>TOOL STEERING
        </div>
        <div class="iv-meta-chips">
          <div class="meta-chip"><span class="mc-dot"></span>Engineering · 4 people</div>
          <div class="meta-chip">10:14:08</div>
        </div>
      </div>

      <div class="iv-card-body">
        <div class="iv-headline">4 engineers writing code in <span class="hl-strike">ChatGPT</span>.</div>
        <div class="iv-subline">Your org bought <span class="hl-em">6 Cursor seats</span>. They're sitting unused.</div>
      </div>

      <!-- VISUAL ZONE: two mini-app windows + arrow + avatars -->
      <div class="iv-visual viz-1">
        <!-- Left: ChatGPT (dimmed) -->
        <div class="mini-app mini-from">
          <div class="mini-titlebar">
            <span class="mini-dot d-r"></span><span class="mini-dot d-y"></span><span class="mini-dot d-g"></span>
            <span class="mini-title">ChatGPT · code</span>
          </div>
          <div class="mini-body">
            <div class="mini-line w-90"></div>
            <div class="mini-line w-70"></div>
            <div class="mini-line w-50"></div>
            <div class="mini-line w-80"></div>
            <div class="mini-stamp stamp-bad">SUBOPTIMAL</div>
          </div>
        </div>

        <!-- Arrow flow -->
        <div class="flow-arrow">
          <svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FF9966"/>
                <stop offset="100%" stop-color="#FF0000"/>
              </linearGradient>
            </defs>
            <path class="flow-path" d="M 10 60 L 200 60" stroke="url(#flow-grad)" stroke-width="4" fill="none" stroke-dasharray="200" stroke-dashoffset="200" stroke-linecap="round"/>
            <path class="flow-head" d="M 190 45 L 220 60 L 190 75" stroke="url(#flow-grad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
          </svg>
          <div class="flow-label">switching</div>
        </div>

        <!-- Right: Cursor (highlighted) -->
        <div class="mini-app mini-to">
          <div class="mini-titlebar tt-on">
            <span class="mini-dot d-r"></span><span class="mini-dot d-y"></span><span class="mini-dot d-g"></span>
            <span class="mini-title">Cursor · code</span>
          </div>
          <div class="mini-body bd-on">
            <div class="mini-line w-90 on"></div>
            <div class="mini-line w-60 on"></div>
            <div class="mini-line w-80 on"></div>
            <div class="mini-line w-40 on"></div>
            <div class="mini-stamp stamp-good">PAID · UNUSED</div>
          </div>
          <div class="mini-glow"></div>
        </div>

        <!-- Avatar row at bottom of visual -->
        <div class="avatar-row">
          <div class="av av-1">JM</div>
          <div class="av av-2">SP</div>
          <div class="av av-3">DK</div>
          <div class="av av-4">AR</div>
          <div class="av-label">switching now</div>
        </div>
      </div>

      <div class="iv-card-foot">
        <div class="foot-stat">
          <div class="fs-label">License recovered</div>
          <div class="fs-val"><span class="fs-money">$2,400</span><span class="fs-unit">/yr</span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Productivity gain</div>
          <div class="fs-val"><span class="fs-money">3×</span><span class="fs-unit"> debug speed</span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Action</div>
          <div class="fs-val"><span class="fs-pill"><span class="fs-pill-dot"></span>Done</span></div>
        </div>
      </div>

      <div class="iv-card-progress"><div class="iv-card-progress-fill"></div></div>
    </div>

    <!-- ═══════════ CARD 2 · WORKFLOW DISCOVERY ═══════════ -->
    <div class="iv-card iv-card-2">
      <div class="iv-card-head">
        <div class="iv-tag tag-discovery">
          <span class="iv-dot"></span>WORKFLOW DISCOVERY
        </div>
        <div class="iv-meta-chips">
          <div class="meta-chip"><span class="mc-dot mc-dot-purple"></span>Legal · London office</div>
          <div class="meta-chip">10:14:14</div>
        </div>
      </div>

      <div class="iv-card-body">
        <div class="iv-headline">An AI <span class="hl-em-p">contract review</span> workflow found in Legal.</div>
        <div class="iv-subline">2 senior associates built it. Saving <span class="hl-em-p">6 hours each</span>, every week.</div>
      </div>

      <!-- VISUAL ZONE: 4-step workflow + global spread map -->
      <div class="iv-visual viz-2">
        <!-- Workflow steps -->
        <div class="workflow">
          <div class="wf-step">
            <div class="wf-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2 H6 A2 2 0 0 0 4 4 V20 A2 2 0 0 0 6 22 H18 A2 2 0 0 0 20 20 V8 Z"/><path d="M14 2 V8 H20"/><path d="M9 13 H15"/><path d="M9 17 H15"/>
              </svg>
            </div>
            <div class="wf-label">Ingest contract</div>
          </div>
          <div class="wf-connect"><div class="wf-pip"></div></div>
          <div class="wf-step">
            <div class="wf-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><path d="M21 21 L16.5 16.5"/>
              </svg>
            </div>
            <div class="wf-label">Compare templates</div>
          </div>
          <div class="wf-connect"><div class="wf-pip"></div></div>
          <div class="wf-step">
            <div class="wf-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4 L20 4 L20 16 L13 16 L8 21 L8 16 L4 16 Z"/><line x1="9" y1="10" x2="15" y2="10"/>
              </svg>
            </div>
            <div class="wf-label">Flag risk clauses</div>
          </div>
          <div class="wf-connect"><div class="wf-pip"></div></div>
          <div class="wf-step wf-step-out">
            <div class="wf-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2 L15 8 L21 9 L17 14 L18 20 L12 17 L6 20 L7 14 L3 9 L9 8 Z"/>
              </svg>
            </div>
            <div class="wf-label">Generate redline</div>
          </div>
        </div>

        <!-- Global map -->
        <div class="map">
          <div class="map-label">Spreading to 6 offices</div>
          <svg class="map-svg" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Simplified continents (abstract dots pattern) -->
            <g class="map-dots" fill="rgba(20,17,10,0.10)">
              <circle cx="70" cy="80" r="2"/><circle cx="85" cy="70" r="2"/><circle cx="100" cy="85" r="2"/><circle cx="115" cy="95" r="2"/><circle cx="80" cy="95" r="2"/><circle cx="95" cy="105" r="2"/><circle cx="120" cy="75" r="2"/><circle cx="65" cy="105" r="2"/>
              <circle cx="180" cy="60" r="2"/><circle cx="195" cy="75" r="2"/><circle cx="210" cy="65" r="2"/><circle cx="220" cy="80" r="2"/><circle cx="235" cy="70" r="2"/><circle cx="250" cy="85" r="2"/><circle cx="200" cy="90" r="2"/>
              <circle cx="295" cy="75" r="2"/><circle cx="310" cy="85" r="2"/><circle cx="325" cy="70" r="2"/><circle cx="340" cy="90" r="2"/><circle cx="320" cy="100" r="2"/><circle cx="300" cy="95" r="2"/>
              <circle cx="395" cy="80" r="2"/><circle cx="410" cy="70" r="2"/><circle cx="425" cy="90" r="2"/><circle cx="440" cy="75" r="2"/><circle cx="455" cy="95" r="2"/><circle cx="430" cy="105" r="2"/>
              <circle cx="500" cy="75" r="2"/><circle cx="515" cy="90" r="2"/><circle cx="530" cy="80" r="2"/><circle cx="545" cy="95" r="2"/>
              <circle cx="180" cy="140" r="2"/><circle cx="200" cy="150" r="2"/><circle cx="220" cy="145" r="2"/>
              <circle cx="320" cy="155" r="2"/><circle cx="340" cy="165" r="2"/>
              <circle cx="465" cy="155" r="2"/><circle cx="485" cy="165" r="2"/>
            </g>
            <!-- Office pings -->
            <g class="map-pings">
              <circle class="ping ping-1" cx="290" cy="85" r="0" fill="#FF6600"/>
              <circle class="ping ping-2" cx="100" cy="100" r="0" fill="#FF6600"/>
              <circle class="ping ping-3" cx="420" cy="90" r="0" fill="#FF6600"/>
              <circle class="ping ping-4" cx="510" cy="75" r="0" fill="#FF6600"/>
              <circle class="ping ping-5" cx="210" cy="150" r="0" fill="#FF6600"/>
              <circle class="ping ping-6" cx="335" cy="155" r="0" fill="#FF6600"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="iv-card-foot">
        <div class="foot-stat">
          <div class="fs-label">Lawyers receiving</div>
          <div class="fs-val"><span class="fs-money">247</span><span class="fs-unit"> people</span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Hours saved</div>
          <div class="fs-val"><span class="fs-money">2,964</span><span class="fs-unit">/wk</span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Value created</div>
          <div class="fs-val"><span class="fs-money">$487K</span><span class="fs-unit">/yr</span></div>
        </div>
      </div>

      <div class="iv-card-progress"><div class="iv-card-progress-fill purple"></div></div>
    </div>

    <!-- ═══════════ CARD 3 · FRICTION DETECTION ═══════════ -->
    <div class="iv-card iv-card-3">
      <div class="iv-card-head">
        <div class="iv-tag tag-friction">
          <span class="iv-dot"></span>FRICTION DETECTED
        </div>
        <div class="iv-meta-chips">
          <div class="meta-chip"><span class="mc-dot mc-dot-red"></span>Ops · 87-page contract</div>
          <div class="meta-chip">10:14:18</div>
        </div>
      </div>

      <div class="iv-card-body">
        <div class="iv-headline">Session about to be <span class="hl-strike">abandoned</span>. Context overflow on ChatGPT.</div>
        <div class="iv-subline">Redirecting to <span class="hl-em-g">Claude</span> with automatic chunking strategy.</div>
      </div>

      <!-- VISUAL ZONE: before/after swap + sparkline -->
      <div class="iv-visual viz-3">
        <!-- Tool swap before/after -->
        <div class="swap">
          <div class="swap-side swap-from">
            <div class="swap-icon swap-icon-bad">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/><path d="M8 8 L16 16"/><path d="M16 8 L8 16"/>
              </svg>
            </div>
            <div class="swap-tool">ChatGPT</div>
            <div class="swap-meta">3 attempts · abandoned</div>
            <div class="swap-bar swap-bar-bad">
              <div class="sb-fill sb-fill-bad"></div>
            </div>
          </div>

          <div class="swap-arrow">
            <svg viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg">
              <path class="swap-arrow-path" d="M 6 15 L 65 15" stroke="#FF6600" stroke-width="3" fill="none" stroke-dasharray="60" stroke-dashoffset="60" stroke-linecap="round"/>
              <path class="swap-arrow-head" d="M 56 8 L 74 15 L 56 22" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
            </svg>
          </div>

          <div class="swap-side swap-to">
            <div class="swap-icon swap-icon-good">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M7 12 L11 16 L17 9"/>
              </svg>
            </div>
            <div class="swap-tool">Claude · chunked</div>
            <div class="swap-meta">session completed</div>
            <div class="swap-bar swap-bar-good">
              <div class="sb-fill sb-fill-good"></div>
            </div>
          </div>
        </div>

        <!-- Sparkline + abandonment rate -->
        <div class="spark">
          <div class="spark-head">
            <div class="spark-label">Abandonment rate · last 30 days</div>
            <div class="spark-stat">
              <span class="ss-from">23%</span>
              <span class="ss-arrow">→</span>
              <span class="ss-to">4%</span>
            </div>
          </div>
          <svg class="spark-svg" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <defs>
              <linearGradient id="spark-fill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FF6600" stop-opacity="0.30"/>
                <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <!-- baseline grid lines -->
            <line x1="0" y1="30" x2="800" y2="30" stroke="rgba(20,17,10,0.08)" stroke-width="1"/>
            <line x1="0" y1="60" x2="800" y2="60" stroke="rgba(20,17,10,0.08)" stroke-width="1"/>
            <line x1="0" y1="90" x2="800" y2="90" stroke="rgba(20,17,10,0.08)" stroke-width="1"/>
            <!-- area under curve -->
            <path class="spark-area" d="M 0 30 L 50 28 L 100 32 L 150 25 L 200 38 L 250 30 L 300 35 L 350 28 L 400 40 L 450 55 L 500 70 L 550 85 L 600 95 L 650 102 L 700 105 L 750 108 L 800 110 L 800 120 L 0 120 Z" fill="url(#spark-fill)"/>
            <!-- line -->
            <path class="spark-line" d="M 0 30 L 50 28 L 100 32 L 150 25 L 200 38 L 250 30 L 300 35 L 350 28 L 400 40 L 450 55 L 500 70 L 550 85 L 600 95 L 650 102 L 700 105 L 750 108 L 800 110" stroke="#FF6600" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1100" stroke-dashoffset="1100"/>
            <!-- intervention marker -->
            <line class="spark-marker" x1="400" y1="10" x2="400" y2="115" stroke="#14110A" stroke-width="1" stroke-dasharray="3 4" opacity="0"/>
            <text class="spark-marker-text" x="408" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#14110A" opacity="0">Devise live</text>
            <circle class="spark-dot" cx="800" cy="110" r="6" fill="#FF6600" opacity="0"/>
          </svg>
        </div>
      </div>

      <div class="iv-card-foot">
        <div class="foot-stat">
          <div class="fs-label">Drop in abandonment</div>
          <div class="fs-val"><span class="fs-money">-83%</span><span class="fs-unit"></span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Session result</div>
          <div class="fs-val"><span class="fs-money">Completed</span></div>
        </div>
        <div class="foot-divider"></div>
        <div class="foot-stat">
          <div class="fs-label">Action</div>
          <div class="fs-val"><span class="fs-pill"><span class="fs-pill-dot"></span>Intervened</span></div>
        </div>
      </div>

      <div class="iv-card-progress"><div class="iv-card-progress-fill"></div></div>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap");

      [data-composition-id="interventions"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F5EDE0; color: #14110A;
      }
      [data-composition-id="interventions"] .iv-bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 30% 50%, #FCF6E7 0%, #F5EDE0 60%, #EBDFC9 100%);
      }
      [data-composition-id="interventions"] .iv-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }
      [data-composition-id="interventions"] .iv-net {
        position: absolute; inset: 0; width: 100%; height: 100%;
        opacity: 0.6;
      }

      /* ── Header ── */
      [data-composition-id="interventions"] .iv-status {
        position: absolute; top: 64px; left: 80px;
        display: flex; align-items: center; gap: 16px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 500; font-size: 22px;
        color: #14110A; opacity: 0;
      }
      [data-composition-id="interventions"] .iv-pulse {
        width: 12px; height: 12px;
        border-radius: 50%;
        background: #FF0000;
      }
      [data-composition-id="interventions"] .iv-live-text { letter-spacing: 0.05em; }
      [data-composition-id="interventions"] .iv-time {
        margin-left: 24px;
        color: rgba(20,17,10,0.55);
        letter-spacing: 0.05em;
      }
      [data-composition-id="interventions"] .iv-total {
        position: absolute; top: 64px; right: 80px;
        text-align: right;
        font-family: "Plus Jakarta Sans", sans-serif;
        opacity: 0;
      }
      [data-composition-id="interventions"] .iv-total-label {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500; font-size: 18px;
        color: rgba(20,17,10,0.55);
        letter-spacing: 0.06em; text-transform: uppercase;
        margin-bottom: 6px;
      }
      [data-composition-id="interventions"] .iv-total-val {
        font-weight: 800; font-size: 96px; line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 60%, #FF0000 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        font-feature-settings: "tnum";
      }
      [data-composition-id="interventions"] .iv-total-val .dollar { font-size: 64px; vertical-align: super; line-height: 1; }

      /* ── Card shell ── */
      [data-composition-id="interventions"] .iv-card {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        width: 1520px;
        background: #FFFFFF;
        border: 1px solid rgba(20,17,10,0.10);
        border-radius: 32px;
        padding: 36px 44px 40px;
        box-shadow:
          0 24px 64px rgba(20,17,10,0.10),
          0 6px 18px rgba(255,102,0,0.10),
          inset 0 1px 0 rgba(255,255,255,0.9);
        opacity: 0;
      }

      [data-composition-id="interventions"] .iv-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

        display: inline-flex; align-items: center; gap: 10px;
        padding: 8px 16px;
        border-radius: 999px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600; font-size: 16px;
        letter-spacing: 0.14em;
      }
      [data-composition-id="interventions"] .iv-dot {
        width: 8px; height: 8px; border-radius: 50%;

      [data-composition-id="interventions"] .tag-discovery { background: rgba(123,47,255,0.10); color: #5B1FCC; }
      [data-composition-id="interventions"] .tag-discovery .iv-dot { background: #7B2FFF; }
      [data-composition-id="interventions"] .tag-friction { background: rgba(220,38,38,0.10); color: #A11616; }
      [data-composition-id="interventions"] .tag-friction .iv-dot { background: #DC2626; }

      [data-composition-id="interventions"] .iv-meta-chips {
        display: flex; gap: 10px;
      }
      [data-composition-id="interventions"] .meta-chip {
        padding: 6px 14px;
        border-radius: 8px;
        background: rgba(20,17,10,0.05);
        font-family: "JetBrains Mono", monospace;
        font-weight: 500; font-size: 14px;
        color: rgba(20,17,10,0.65);

        display: inline-flex; align-items: center; gap: 8px;

      [data-composition-id="interventions"] .mc-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #FF6600;
      }
      [data-composition-id="interventions"] .mc-dot-purple { background: #7B2FFF; }
      [data-composition-id="interventions"] .mc-dot-red { background: #DC2626; }

      [data-composition-id="interventions"] .iv-card-body {
        margin-bottom: 28px;
      }
      [data-composition-id="interventions"] .iv-headline {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 700; font-size: 46px;

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="interventions"]');

        const status = root.querySelector(".iv-status");
        const total = root.querySelector(".iv-total");
        const totalCounter = root.querySelector("#total-counter");
        const cards = root.querySelectorAll(".iv-card");
        const progresses = root.querySelectorAll(".iv-card-progress-fill");
        const timeEl = root.querySelector("#iv-time");

        // Card 1 visual elements
        const c1 = cards[0];
        const c1From = c1.querySelector(".mini-from");
        const c1To = c1.querySelector(".mini-to");
        const c1Arrow = c1.querySelector(".flow-arrow");
        const c1FlowPath = c1.querySelector(".flow-path");
        const c1FlowHead = c1.querySelector(".flow-head");
        const c1Glow = c1.querySelector(".mini-glow");
        const c1Avatars = c1.querySelector(".avatar-row");

        // Card 2 visual elements
        const c2 = cards[1];
        const c2Steps = c2.querySelectorAll(".wf-step");
        const c2Pips = c2.querySelectorAll(".wf-pip");
        const c2Map = c2.querySelector(".map");
        const c2Pings = c2.querySelectorAll(".ping");

        // Card 3 visual elements
        const c3 = cards[2];
        const c3From = c3.querySelector(".swap-from");
        const c3To = c3.querySelector(".swap-to");
        const c3Arrow = c3.querySelector(".swap-arrow");
        const c3ArrowPath = c3.querySelector(".swap-arrow-path");
        const c3ArrowHead = c3.querySelector(".swap-arrow-head");
        const c3BarBad = c3.querySelector(".sb-fill-bad");
        const c3BarGood = c3.querySelector(".sb-fill-good");
        const c3Spark = c3.querySelector(".spark");
        const c3SparkLine = c3.querySelector(".spark-line");
        const c3SparkArea = c3.querySelector(".spark-area");
        const c3SparkMarker = c3.querySelector(".spark-marker");
        const c3SparkMarkerText = c3.querySelector(".spark-marker-text");
        const c3SparkDot = c3.querySelector(".spark-dot");

        // Initial states
        cards.forEach(c => gsap.set(c, { y: 80 }));
        gsap.set(status, { y: -20 });
        gsap.set(total, { y: -20 });
        gsap.set(c3SparkArea, { opacity: 0 });

        // 0–0.5: Header bar
        tl.to(status, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0);
        tl.to(total, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 0.15);

        const enterDuration = 0.55;
        const exitDuration = 0.4;
        const cardDuration = 4.6;

        const cardData = [
          { start: 0.5 },
          { start: 5.2 },
          { start: 10.0 }
        ];

        // Card 1 enter
        const t1 = cardData[0].start;
        tl.to(cards[0], { opacity: 1, y: 0, duration: enterDuration, ease: "expo.out" }, t1);
        tl.to(progresses[0], { width: "100%", duration: cardDuration - exitDuration, ease: "none" }, t1);
        // Card 1 visuals
        tl.to(c1From, { opacity: 1, duration: 0.45, ease: "expo.out" }, t1 + 0.5);
        tl.add(() => cards[0].classList.add("hl-on"), t1 + 0.9);
        tl.to(c1From, { opacity: 0.7, filter: "grayscale(0.5) brightness(0.92)", duration: 0.5, ease: "power2.out" }, t1 + 1.1);
        tl.to(c1Arrow, { opacity: 1, duration: 0.35, ease: "power2.out" }, t1 + 1.3);
        tl.to(c1FlowPath, { strokeDashoffset: 0, duration: 0.7, ease: "power2.out" }, t1 + 1.35);
        tl.to(c1FlowHead, { opacity: 1, duration: 0.25, ease: "power2.out" }, t1 + 1.9);
        tl.to(c1To, { opacity: 1, duration: 0.5, ease: "expo.out" }, t1 + 1.7);
        tl.to(c1Glow, { opacity: 1, duration: 0.6, ease: "power2.out" }, t1 + 1.85);
        tl.to(c1Avatars, { opacity: 1, duration: 0.5, ease: "power2.out" }, t1 + 2.4);
        // Card 1 exit
        tl.to(cards[0], { opacity: 0, y: -60, duration: exitDuration, ease: "power2.in" }, t1 + cardDuration - exitDuration);

        // Card 2 enter
        const t2 = cardData[1].start;
        tl.to(cards[1], { opacity: 1, y: 0, duration: enterDuration, ease: "expo.out" }, t2);
        tl.to(progresses[1], { width: "100%", duration: cardDuration - exitDuration, ease: "none" }, t2);
        // Card 2 workflow steps
        c2Steps.forEach((step, i) => {
          gsap.set(step, { y: 20, scale: 0.95 });
          tl.to(step, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "expo.out" }, t2 + 0.5 + i * 0.18);
        });
        c2Pips.forEach((p, i) => {
          tl.to(p, { opacity: 1, left: "100%", duration: 0.35, ease: "power2.inOut" }, t2 + 0.65 + i * 0.18);
        });
        // Map
        tl.to(c2Map, { opacity: 1, duration: 0.5, ease: "expo.out" }, t2 + 0.7);
        c2Pings.forEach((ping, i) => {
          gsap.set(ping, { attr: { r: 0 } });
          tl.to(ping, { attr: { r: 5 }, duration: 0.4, ease: "back.out(2)" }, t2 + 1.5 + i * 0.20);
          // Pulse outward (fake by scaling parent via filter glow inherent)
        });
        // Card 2 exit
        tl.to(cards[1], { opacity: 0, y: -60, duration: exitDuration, ease: "power2.in" }, t2 + cardDuration - exitDuration);

        // Card 3 enter
        const t3 = cardData[2].start;
        tl.to(cards[2], { opacity: 1, y: 0, duration: enterDuration, ease: "expo.out" }, t3);
        tl.to(progresses[2], { width: "100%", duration: cardDuration - exitDuration, ease: "none" }, t3);
        // Card 3 visuals
        tl.to(c3From, { opacity: 1, duration: 0.45, ease: "expo.out" }, t3 + 0.5);
        tl.to(c3BarBad, { width: "100%", duration: 0.6, ease: "power2.out" }, t3 + 0.7);
        tl.add(() => cards[2].classList.add("hl-on"), t3 + 1.2);
        tl.to(c3Arrow, { opacity: 1, duration: 0.3, ease: "power2.out" }, t3 + 1.3);
        tl.to(c3ArrowPath, { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, t3 + 1.35);
        tl.to(c3ArrowHead, { opacity: 1, duration: 0.25, ease: "power2.out" }, t3 + 1.75);
        tl.to(c3To, { opacity: 1, duration: 0.55, ease: "expo.out" }, t3 + 1.6);
        tl.to(c3BarGood, { width: "100%", duration: 0.7, ease: "power2.out" }, t3 + 1.8);
        tl.to(c3Spark, { opacity: 1, duration: 0.5, ease: "power2.out" }, t3 + 2.0);
        tl.to(c3SparkLine, { strokeDashoffset: 0, duration: 1.6, ease: "power2.out" }, t3 + 2.2);
        tl.to(c3SparkArea, { opacity: 1, duration: 0.8, ease: "power2.out" }, t3 + 2.4);
        tl.to([c3SparkMarker, c3SparkMarkerText], { opacity: 1, duration: 0.4, ease: "power2.out" }, t3 + 3.0);
        tl.to(c3SparkDot, { opacity: 1, duration: 0.4, ease: "power2.out" }, t3 + 3.6);

        // ── Total counter ──
        function formatNum(n) {
          if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
          if (n >= 1000) return Math.round(n/1000) + 'K';
          return Math.round(n).toString();
        }
        const totalCtr = { v: 0 };
        // 0 → 2400 during card 1
        tl.to(totalCtr, {
          v: 2400, duration: 1.0, ease: "power2.out",
          onUpdate: () => { totalCounter.textContent = Math.round(totalCtr.v).toLocaleString(); }
        }, 1.4);
        // 2400 → 489400 during card 2
        tl.to(totalCtr, {
          v: 489400, duration: 2.0, ease: "power2.out",
          onUpdate: () => { totalCounter.textContent = formatNum(totalCtr.v); }
        }, 6.0);
        // Pulse on total when big number lands
        tl.to(total, { scale: 1.08, duration: 0.3, ease: "power2.out" }, 7.6);
        tl.to(total, { scale: 1, duration: 0.5, ease: "elastic.out(1, 0.4)" }, 7.9);

        // Clock ticks (deterministic by progress)
        tl.to({}, {
          duration: 14,
          onUpdate: function() {
            const tProg = this.progress();
            const sec = 2 + Math.floor(tProg * 16);
            timeEl.textContent = `10:14:${String(sec).padStart(2,'0')} EDT`;
          }
        }, 0);

        // Exit
        tl.to([status, total, cards[cards.length-1]], {
          opacity: 0, duration: 0.5, ease: "power2.in"
        }, 14.4);

        window.__timelines["interventions"] = tl;
      })();
    </script>
  </div>
</template>
