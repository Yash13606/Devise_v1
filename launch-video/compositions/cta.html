<template id="cta-template">
  <div
    data-composition-id="cta"
    data-width="1920"
    data-height="1080"
    data-start="0"
    data-duration="8"
  >
    <div class="ct-bg"></div>
    <div class="ct-grain"></div>

    <!-- Flame glow behind logo -->
    <div class="ct-flame"></div>

    <!-- Hero logo -->
    <div class="ct-logo-wrap">
      <svg class="ct-logo" viewBox="0 0 2194 2022" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient cx="3039687" cy="2801389" r="4133700" fx="0" fy="5602778"
            gradientUnits="userSpaceOnUse" spreadMethod="pad" id="ct-fill"
            gradientTransform="matrix(0.000360892 0 0 0.000360892 -1798 -103)">
            <stop offset="0" stop-color="#FF0000"/>
            <stop offset="0.5" stop-color="#FF6600"/>
            <stop offset="1" stop-color="#FF9966"/>
          </radialGradient>
        </defs>
        <g transform="translate(-1798 -103)">
          <path d="M2918.94 580.472 2918.94 1060.93 2322.68 1060.93 2322.68 1613.74 2918.94 1613.74 3050.83 1613.74 3425.86 1613.74 3425.86 580.472ZM2889.21 103 3992 103 3992 1083.06 3992 1083.06 3992 1135.11 3463.35 1656.68 3463.34 1656.68 3463.34 2125 2319.01 2125C2031.27 2125 1798 1891.75 1798 1604.02L1798 1083.06C1798 795.331 2031.27 562.079 2319.01 562.079L2889.21 562.079Z"
            fill="url(#ct-fill)" fill-rule="evenodd"/>
        </g>
      </svg>
    </div>

    <!-- Wordmark + tagline -->
    <div class="ct-wordmark">Devise</div>
    <div class="ct-tag">
      <span class="ct-w">Understand.</span><span class="ct-w">Act.</span><span class="ct-w">Quantify.</span>
    </div>

    <!-- Promise line -->
    <div class="ct-promise">The AI Adoption Engine for Every Company.</div>

    <!-- Soft sparkles -->
    <div class="ct-sparks">
      <span class="ct-spark"></span><span class="ct-spark"></span><span class="ct-spark"></span>
      <span class="ct-spark"></span><span class="ct-spark"></span><span class="ct-spark"></span>
      <span class="ct-spark"></span><span class="ct-spark"></span><span class="ct-spark"></span>
      <span class="ct-spark"></span><span class="ct-spark"></span><span class="ct-spark"></span>
    </div>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap");

      [data-composition-id="cta"] {
        width: 1920px; height: 1080px;
        position: relative; overflow: hidden;
        background: #F5EDE0; color: #14110A;
      }
      [data-composition-id="cta"] .ct-bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 40%, #FFF5E0 0%, #F5EDE0 50%, #EBDFC9 100%);
      }
      [data-composition-id="cta"] .ct-grain {
        position: absolute; inset: 0;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.04 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        pointer-events: none; mix-blend-mode: multiply;
      }

      [data-composition-id="cta"] .ct-flame {
        position: absolute;
        left: 50%; top: 32%;
        width: 1200px; height: 1200px;
        margin: -600px 0 0 -600px;
        background: radial-gradient(circle at 50% 50%, rgba(255,102,0,0.30) 0%, rgba(255,153,102,0.15) 30%, transparent 60%);
        filter: blur(40px);
        opacity: 0;
        z-index: 1;
        pointer-events: none;
      }

      [data-composition-id="cta"] .ct-logo-wrap {
        position: absolute;
        left: 50%; top: 32%;
        transform: translate(-50%, -50%);
        width: 360px; height: 326px;
        opacity: 0;
        z-index: 2;
      }
      [data-composition-id="cta"] .ct-logo {
        width: 100%; height: 100%;
        filter: drop-shadow(0 16px 48px rgba(255,102,0,0.40));
      }

      [data-composition-id="cta"] .ct-wordmark {
        position: absolute;
        left: 50%; top: 56%;
        transform: translate(-50%, -50%);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 800;
        font-size: 220px;
        line-height: 1;
        letter-spacing: -0.05em;
        color: #14110A;
        opacity: 0;
        z-index: 3;
      }

      [data-composition-id="cta"] .ct-tag {
        position: absolute;
        left: 50%; top: 72%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 28px;
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 52px;
        color: #2A1F0A;
        letter-spacing: -0.01em;
        z-index: 3;
        white-space: nowrap;
      }
      [data-composition-id="cta"] .ct-w {
        opacity: 0;
        display: inline-block;
      }
      [data-composition-id="cta"] .ct-w:nth-child(2) {
        background: linear-gradient(180deg, #FF9966 0%, #FF6600 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        font-weight: 500;
      }

      [data-composition-id="cta"] .ct-promise {
        position: absolute;
        left: 50%; top: 81%;
        transform: translate(-50%, -50%);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 500;
        font-size: 30px;
        letter-spacing: -0.01em;
        color: rgba(20,17,10,0.65);
        opacity: 0;
        z-index: 3;
      }

      [data-composition-id="cta"] .ct-sparks {
        position: absolute; inset: 0;
        pointer-events: none;
      }
      [data-composition-id="cta"] .ct-spark {
        position: absolute;
        left: 50%; top: 50%;
        width: 4px; height: 4px;
        border-radius: 50%;
        background: #FF9966;
        opacity: 0;
        box-shadow: 0 0 12px rgba(255,153,102,0.8);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="cta"]');

        const flame = root.querySelector(".ct-flame");
        const logoWrap = root.querySelector(".ct-logo-wrap");
        const wordmark = root.querySelector(".ct-wordmark");
        const tagWords = root.querySelectorAll(".ct-w");
        const promise = root.querySelector(".ct-promise");
        const sparks = root.querySelectorAll(".ct-spark");

        // Deterministic seeded PRNG
        function seeded(seed) { return function() { seed |= 0; seed = seed + 0x6D2B79F5 | 0; let t = Math.imul(seed ^ seed >>> 15, 1 | seed); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
        const rnd = seeded(13);
        // Scatter sparks around the logo position
        sparks.forEach((s, i) => {
          const angle = (i / sparks.length) * Math.PI * 2;
          const r = 280 + rnd() * 120;
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * r - 200; // shift up to logo area
          gsap.set(s, { x, y });
        });

        // 0–1.0 : Flame swells + logo materializes
        tl.to(flame, { opacity: 1, duration: 0.8, ease: "power2.out" }, 0);
        gsap.set(logoWrap, { scale: 0.5 });
        tl.to(logoWrap, {
          opacity: 1, scale: 1,
          duration: 0.8, ease: "expo.out"
        }, 0.1);

        // Logo settle bump
        tl.to(logoWrap, { scale: 1.06, duration: 0.2, ease: "power2.out" }, 0.9);
        tl.to(logoWrap, { scale: 1, duration: 0.4, ease: "elastic.out(1, 0.5)" }, 1.1);

        // 0.6 : Sparks fly outward
        tl.to(sparks, {
          opacity: 0.9,
          scale: 1.4,
          duration: 0.4,
          stagger: 0.02,
          ease: "power2.out"
        }, 0.7);
        tl.to(sparks, {
          opacity: 0,
          x: "+=80",
          y: "-=60",
          duration: 1.6,
          stagger: 0.02,
          ease: "power1.out"
        }, 1.1);

        // 1.3 : Wordmark fades in big
        gsap.set(wordmark, { scale: 0.95, y: 20 });
        tl.to(wordmark, {
          opacity: 1, scale: 1, y: 0,
          duration: 0.7, ease: "expo.out"
        }, 1.3);

        // 2.0 : Tagline words stagger
        tagWords.forEach((w, i) => {
          gsap.set(w, { y: 16 });
          tl.to(w, {
            opacity: 1, y: 0,
            duration: 0.4, ease: "expo.out"
          }, 2.0 + i * 0.18);
        });

        // 3.0 : Promise line
        gsap.set(promise, { y: 16 });
        tl.to(promise, {
          opacity: 1, y: 0,
          duration: 0.5, ease: "expo.out"
        }, 3.1);

        // Logo subtle breathing for hold
        tl.to(logoWrap, {
          scale: 1.02,
          duration: 1.2, ease: "sine.inOut",
          yoyo: true, repeat: 1
        }, 4.0);
        tl.to(flame, {
          opacity: 0.85,
          duration: 1.2, ease: "sine.inOut",
          yoyo: true, repeat: 1
        }, 4.0);

        // Final fade — keep logo visible, fade everything else slightly
        tl.to(promise, { opacity: 0.7, duration: 0.5 }, 7.0);

        window.__timelines["cta"] = tl;
      })();
    </script>
  </div>
</template>
